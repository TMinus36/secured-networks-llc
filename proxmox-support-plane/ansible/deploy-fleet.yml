# ==============================================================================
# SECURED NETWORKS LLC - SUPPORT PLANE FLEET DEPLOYMENT
# Target File: proxmox-support-plane/ansible/deploy-fleet.yml
# Compliance: NIST SP 800-53 Rev 5 (CM-2, CM-8 Baseline Configuration)
# Scope: STRICTLY Support Plane LXCs (103-113). Compute Plane decoupled.
# ==============================================================================
---
- name: Phase 0 - Host Network Foundation (Workload Bridging)
  hosts: proxmox_hosts
  gather_facts: false
  vars:
    ansible_python_interpreter: auto_silent
  tasks:
    - name: Ensure vmbr1 workload bridge exists in /etc/network/interfaces
      ansible.builtin.blockinfile:
        path: /etc/network/interfaces
        marker: "# {mark} ANSIBLE MANAGED - vmbr1 workload bridge"
        block: |
          auto vmbr1
          iface vmbr1 inet static
              address 172.16.20.1/24
              bridge-ports none
              bridge-stp off
              bridge-fd 0
              post-up   iptables -t nat -A POSTROUTING -s 172.16.20.0/24 -o vmbr0 -j MASQUERADE
              post-down iptables -t nat -D POSTROUTING -s 172.16.20.0/24 -o vmbr0 -j MASQUERADE
      notify: bring up vmbr1

    - name: Force bridge materialization in kernel immediately
      ansible.builtin.meta: flush_handlers

  handlers:
    - name: bring up vmbr1
      ansible.builtin.command: ifup vmbr1
      failed_when: false

- name: Phase 1 - Hypervisor Optimization & Declarative SDN Mesh Setup
  hosts: proxmox_hosts
  gather_facts: true
  vars:
    ansible_python_interpreter: auto_silent
  tasks:
    - name: Enforce Host-Level Swappiness for Failsafe Memory Oversubscription
      ansible.posix.sysctl:
        name: vm.swappiness
        value: '10'
        state: present
        reload: true

    - name: Enable IP forwarding for inter-bridge routing
      ansible.posix.sysctl:
        name: net.ipv4.ip_forward
        value: '1'
        state: present
        reload: true

    - name: Create SDN Simple Zones for isolated backend segments
      ansible.builtin.command: >
        pvesh create /cluster/sdn/zones
        --zone {{ item.zone }}
        --type simple
      register: sdn_zone_init
      failed_when: false
      changed_when: "'already exists' not in sdn_zone_init.stderr"
      loop:
        - { zone: "zone-edge" }
        - { zone: "zone-data" }
        - { zone: "zone-obs"  }

    - name: Create VNets and bind to their zones
      ansible.builtin.command: >
        pvesh create /cluster/sdn/vnets
        --vnet {{ item.vnet }}
        --zone {{ item.zone }}
      register: vnet_creation
      failed_when: false
      changed_when: "'already exists' not in vnet_creation.stderr"
      loop:
        - { vnet: "vnet20_edge", zone: "zone-edge" }
        - { vnet: "vnet30_db",   zone: "zone-data" }
        - { vnet: "vnet40_obs",  zone: "zone-obs"  }

    - name: Declare subnets with gateways and SNAT egress
      ansible.builtin.command: >
        pvesh create /cluster/sdn/vnets/{{ item.vnet }}/subnets
        --subnet {{ item.cidr }}
        --gateway {{ item.gw }}
        --snat 1
      register: subnet_creation
      failed_when: false
      changed_when: "'already exists' not in subnet_creation.stderr"
      loop:
        - { vnet: "vnet20_edge", cidr: "172.16.10.0/24", gw: "172.16.10.1" }
        - { vnet: "vnet30_db",   cidr: "172.16.30.0/24", gw: "172.16.30.1" }
        - { vnet: "vnet40_obs",  cidr: "172.16.40.0/24", gw: "172.16.40.1" }

    - name: Apply SDN config and materialise bridge interfaces on the host
      ansible.builtin.command: pvesh set /cluster/sdn
      register: sdn_apply
      changed_when: true

- name: Phase 2 - Disaster Recovery & Declarative Support Plane Provisioning
  hosts: local_deployer
