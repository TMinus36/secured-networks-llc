    pve_api_secret: "3006abce-ae0c-4307-83c2-23402b58d7b7"
    pve_node_name: "proxmox"
    default_lxc_password: "Sn-Lxc-Admin-2026!"
    lxc_pubkey: "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIDOcsGCff2CIhqfjk6699Au/PZAulYKI69tjWUYUDO1v ansible-provisioner@sn-llc"
