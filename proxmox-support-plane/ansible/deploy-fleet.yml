      - { name: "sn-loki-tsdb", vmid: 111, mem: 1536, cores: 2, disk: 32, nesting: false, net: '{"net0":"name=eth0,ip=172.16.40.111/24,bridge=vnet40_obs,gw=172.16.40.1"}' }
      - { name: "sn-prometheus-metrics", vmid: 112, mem: 1536, cores: 2, disk: 16, nesting: false, net: '{"net0":"name=eth0,ip=172.16.40.112/24,bridge=vnet40_obs,gw=172.16.40.1"}' }
      - { name: "sn-grafana-ui", vmid: 113, mem: 1024, cores: 2, disk: 8, nesting: false, net: '{"net0":"name=eth0,ip=172.16.40.113/24,bridge=vnet40_obs,gw=172.16.40.1"}' }

  tasks:
    - name: Purge Legacy Support Plane Fleet (Rip and Rebuild)
      community.general.proxmox:
        api_user: "{{ pve_api_user }}"
        api_token_id: "{{ pve_api_token }}"
        api_token_secret: "{{ pve_api_secret }}"
        api_host: "{{ pve_api_host }}"
        validate_certs: false
        vmid: "{{ item.vmid }}"
        node: "{{ pve_node_name }}"
        state: absent
        force: true
      loop: "{{ lxc_fleet }}"
      ignore_errors: true
      when: item.vmid != 102 

    - name: Provision Multi-Tenant Secure Support Plane
      community.general.proxmox:
        api_user: "{{ pve_api_user }}"
        api_token_id: "{{ pve_api_token }}"
        api_token_secret: "{{ pve_api_secret }}"
        api_host: "{{ pve_api_host }}"
        validate_certs: false
        hostname: "{{ item.name }}"
        vmid: "{{ item.vmid }}"
        node: "{{ pve_node_name }}"
        password: "{{ default_lxc_password }}"
        pubkey: "{{ lxc_pubkey }}"
        ostemplate: "{{ os_template }}"
        memory: "{{ item.mem }}"
        cores: "{{ item.cores }}"
        disk: "{{ storage_pool }}:{{ item.disk }}"
        netif: "{{ item.net }}"
        unprivileged: true
        features: ["nesting={{ item.nesting | int }}"]
        onboot: true
        state: present
      loop: "{{ lxc_fleet }}"