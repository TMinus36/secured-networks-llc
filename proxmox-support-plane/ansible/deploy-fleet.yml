      - { name: "sn-devops-gitea", vmid: 104, mem: 2048, cores: 2, disk: 16, nesting: false, net: '{"net0":"name=eth0,ip=10.0.0.104/24,bridge=vmbr0,gw=10.0.0.1"}' }
      - { name: "sn-edge-proxy", vmid: 105, mem: 512, cores: 2, disk: 4, nesting: false, net: '{"net0":"name=eth0,ip=10.0.0.105/24,bridge=vmbr0,gw=10.0.0.1", "net1":"name=eth1,ip=172.16.10.105/24,bridge=vnet20_edge"}' }
      - { name: "sn-auth-authentik", vmid: 106, mem: 2048, cores: 2, disk: 16, nesting: true, net: '{"net0":"name=eth0,ip=10.0.0.106/24,bridge=vmbr0,gw=10.0.0.1", "net1":"name=eth1,ip=172.16.10.106/24,bridge=vnet20_edge"}' }
      - { name: "sn-guacamole-gateway", vmid: 107, mem: 2048, cores: 2, disk: 8, nesting: false, net: '{"net0":"name=eth0,ip=10.0.0.107/24,bridge=vmbr0,gw=10.0.0.1", "net1":"name=eth1,ip=172.16.10.107/24,bridge=vnet20_edge"}' }
      - { name: "sn-tailscale-exit", vmid: 108, mem: 512, cores: 1, disk: 4, nesting: false, net: '{"net0":"name=eth0,ip=10.0.0.108/24,bridge=vmbr0,gw=10.0.0.1", "net1":"name=eth1,ip=172.16.10.108/24,bridge=vnet20_edge"}' }
      - { name: "sn-db-postgres", vmid: 109, mem: 2048, cores: 2, disk: 32, nesting: false, net: '{"net0":"name=eth0,ip=172.16.30.109/24,bridge=vnet30_db,gw=172.16.30.1"}' }
