# 03-configure-traefik.yml
---
- name: Zone 2 Edge Proxy - Traefik Deployment
  hosts: sn-edge-proxy
  become: true
  tasks:
    - name: Deploy Traefik Dynamic Configuration (Routing)
      ansible.builtin.copy:
        dest: /etc/traefik/dynamic/routes.yml
        owner: root
        group: root
        mode: '0644'
        content: |
          http:
            routers:
              gitea:
                rule: "Host(`gitea.att.local`)"
                service: gitea-svc
              authentik:
                rule: "Host(`auth.att.local`)"
                service: authentik-svc
              guacamole:
                rule: "Host(`guac.att.local`)"
                service: guac-svc
            services:
              gitea-svc:
                loadBalancer:
                  servers:
                    - url: "http://10.0.0.104:3000"
              authentik-svc:
                loadBalancer:
                  servers:
                    - url: "http://10.0.0.106:9000"
              guac-svc:
                loadBalancer:
                  servers:
                    - url: "http://10.0.0.107:8080"