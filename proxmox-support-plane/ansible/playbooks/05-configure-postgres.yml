---
- name: Zone 3 Data/Secrets - Native PostgreSQL Deployment
  hosts: database_nodes
  become: true
  gather_facts: true
  vars:
    postgres_version: "15"
    postgres_data_dir: "/var/lib/postgresql/{{ postgres_version }}/main"
  
  tasks:
    - name: Install PostgreSQL Server and Extension Packages
      ansible.builtin.apt:
        name:
          - "postgresql-{{ postgres_version }}"
          - "postgresql-contrib-{{ postgres_version }}"
          - python3-psycopg2
        state: present
        update_cache: true

    - name: Configure PostgreSQL to Listen on Isolated DB Interface
      ansible.builtin.lineinfile:
        path: "/etc/postgresql/{{ postgres_version }}/main/postgresql.conf"
        regexp: "^#?listen_addresses\\s*=\\s*.*"
        line: "listen_addresses = '172.16.30.109,127.0.0.1'"
        state: present
      notify: Restart PostgreSQL

    - name: Enforce Host-Based Authentication (pg_hba.conf)
      ansible.builtin.blockinfile:
        path: "/etc/postgresql/{{ postgres_version }}/main/pg_hba.conf"
        block: |
          # IPv4 Local Connections for Services
          host    all             all             127.0.0.1/32            scram-sha-256
          # Zone 1 Management Network Access (Gitea Node Cross-Zone Routing)
          host    giteadb         gitea_admin     10.0.0.104/32           scram-sha-256
          # Zone 2 Edge/Access Network Access (Authentik/Guacamole Cross-Zone Routing)
          host    authentik       authentik_admin 10.0.0.106/32           scram-sha-256
          host    guacamoledb     guac_admin      10.0.0.107/32           scram-sha-256
        insertafter: EOF
      notify: Restart PostgreSQL

    - name: Ensure PostgreSQL Service Is Running and Enabled
      ansible.builtin.systemd:
        name: postgresql
        state: started
        enabled: true

  handlers:
    - name: Restart PostgreSQL
      ansible.builtin.systemd:
        name: postgresql
        state: restarted