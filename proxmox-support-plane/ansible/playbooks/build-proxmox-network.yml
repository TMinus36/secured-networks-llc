---
- name: Enforce Production Static IP Matrix across LXC Fleet
  hosts: proxmox
  gather_facts: false
  tasks:
    - name: Configure Static Network Stack for Persistent Workloads
      community.general.proxmox_nic:
        vmid: "{{ item.vmid }}"
        interface: net0
        bridge: "{{ item.bridge }}"
        ip4: "{{ item.ip_cidr }}"
        gw4: "{{ item.gateway }}"
        firewall: true
        state: present
      loop:
        - { vmid: 104, bridge: 'vnet10mg', ip_cidr: '10.10.0.101/24', gateway: '10.10.0.1' }
        - { vmid: 106, bridge: 'vnet10mg', ip_cidr: '10.10.0.106/24', gateway: '10.10.0.1' }
        - { vmid: 109, bridge: 'vnet30db', ip_cidr: '172.16.30.103/24', gateway: '172.16.30.1' }
        - { vmid: 110, bridge: 'vnet30db', ip_cidr: '172.16.30.104/24', gateway: '172.16.30.1' }
        - { vmid: 102, bridge: 'vnet40sc', ip_cidr: '172.16.40.200/24', gateway: '172.16.40.1' }
        - { vmid: 111, bridge: 'vnet50ob', ip_cidr: '172.16.50.111/24', gateway: '172.16.50.1' }
        - { vmid: 112, bridge: 'vnet50ob', ip_cidr: '172.16.50.112/24', gateway: '172.16.50.1' }
        - { vmid: 113, bridge: 'vnet50ob', ip_cidr: '172.16.50.113/24', gateway: '172.16.50.1' }