[management]
sn-dns-unbound ansible_host=10.0.0.103
sn-devops-gitea ansible_host=10.0.0.104

[edge]
sn-edge-proxy ansible_host=10.0.0.105
sn-auth-authentik ansible_host=10.0.0.106
sn-guacamole-gateway ansible_host=10.0.0.107
sn-tailscale-exit ansible_host=10.0.0.108

[data]
att-db-postgres ansible_host=172.16.30.109
att-vault-secrets ansible_host=172.16.30.110

[observability]
sn-loki-tsdb ansible_host=172.16.40.111
sn-prometheus-metrics ansible_host=172.16.40.112
sn-grafana-ui ansible_host=172.16.40.113

[support_plane:children]
management
edge
data
observability

[support_plane:vars]
ansible_user=root
ansible_connection=ssh
ansible_python_interpreter=auto_silent
ansible_ssh_common_args='-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null'

[data:vars]
ansible_ssh_common_args='-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o ProxyJump=root@10.0.0.95'

[observability:vars]
ansible_ssh_common_args='-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o ProxyJump=root@10.0.0.95'