[proxmox_hosts]
pve_node ansible_host=10.0.0.95 ansible_user=root ansible_ssh_private_key_file=~/.ssh/id_ed25519_proxmox_sn

[local_deployer]
deployer ansible_connection=local

[management]
sn-dns-unbound ansible_host=10.0.0.103 ansible_ssh_private_key_file=~/.ssh/id_ed25519_att
sn-devops-gitea ansible_host=10.0.0.104 ansible_ssh_private_key_file=~/.ssh/id_ed25519_att

[edge]
sn-edge-proxy ansible_host=10.0.0.105 ansible_ssh_private_key_file=~/.ssh/id_ed25519_att
sn-auth-authentik ansible_host=10.0.0.106 ansible_ssh_private_key_file=~/.ssh/id_ed25519_att
sn-guacamole-gateway ansible_host=10.0.0.107 ansible_ssh_private_key_file=~/.ssh/id_ed25519_att
sn-tailscale-exit ansible_host=10.0.0.108 ansible_ssh_private_key_file=~/.ssh/id_ed25519_att
sn-grafana-ui ansible_host=10.0.0.113 ansible_ssh_private_key_file=~/.ssh/id_ed25519_att

[data]
att-db-postgres ansible_host=172.16.30.109 ansible_ssh_private_key_file=~/.ssh/id_ed25519_att
att-vault-secrets ansible_host=172.16.30.110 ansible_ssh_private_key_file=~/.ssh/id_ed25519_att

[observability]
sn-loki-tsdb ansible_host=172.16.40.111 ansible_ssh_private_key_file=~/.ssh/id_ed25519_att
sn-prometheus-metrics ansible_host=172.16.40.112 ansible_ssh_private_key_file=~/.ssh/id_ed25519_att

[support_plane:children]
management
edge
data
observability

[support_plane:vars]
ansible_user=root
ansible_connection=ssh
ansible_ssh_common_args='-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null'

[data:vars]
ansible_ssh_common_args='-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o ProxyJump=root@10.0.0.95'

[observability:vars]
ansible_ssh_common_args='-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o ProxyJump=root@10.0.0.95'