---
- name: Install prometheus dependencies
  ansible.builtin.apt:
    name:
      - wget
      - ca-certificates
    state: present
    update_cache: true

- name: Create prometheus user
  ansible.builtin.user:
    name: prometheus
    system: true
    shell: /usr/sbin/nologin
    create_home: false

- name: Create prometheus directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: prometheus
    group: prometheus
    mode: "0750"
  loop:
    - /etc/prometheus
    - /var/lib/prometheus

- name: Placeholder prometheus binary install
  ansible.builtin.debug:
    msg: "TODO: install prometheus binary and systemd unit"