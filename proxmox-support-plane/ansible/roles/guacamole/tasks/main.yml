---
- name: Install Tomcat Runtime and Guacd Engines via APT
  ansible.builtin.apt:
    name:
      - tomcat10
      - guacd
      - libguac-client-ssh0
      - libguac-client-vnc0
      - libguac-client-rdp0
    state: present
    update_cache: true

- name: Enforce Guacamole Context Directory Matrix
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: tomcat
    group: tomcat
    mode: '0750'
  loop:
    - /etc/guacamole
    - /etc/guacamole/extensions
    - /etc/guacamole/lib

- name: Fetch Guacamole Web Deployment Archive from Official Mirror
  ansible.builtin.get_url:
    url: "https://downloads.apache.org/guacamole/1.5.5/binary/guacamole-1.5.5.war"
    dest: /var/lib/tomcat10/webapps/guacamole.war
    owner: tomcat
    group: tomcat
    mode: '0644'
    validate_certs: true

- name: Deploy Apache Guacamole Static Properties
  ansible.builtin.copy:
    dest: /etc/guacamole/guacamole.properties
    owner: tomcat
    group: tomcat
    mode: '0600'
    content: |
      guacd-hostname: localhost
      guacd-port: 4822
      auth-provider: net.sourceforge.guacamole.net.auth.usermapping.UserMappingAuthenticationProvider
      user-mapping: /etc/guacamole/user-mapping.xml

- name: Compile Security Access Control Mappings
  ansible.builtin.template:
    src: user-mapping.xml.j2
    dest: /etc/guacamole/user-mapping.xml
    owner: tomcat
    group: tomcat
    mode: '0600'

- name: Mount Configuration Link into Tomcat Service Context
  ansible.builtin.file:
    src: /etc/guacamole
    dest: /usr/share/tomcat10/.guacamole
    state: link

- name: Commit and Restart Guacamole Service Stack
  ansible.builtin.systemd:
    name: "{{ item }}"
    state: restarted
    enabled: true
  loop:
    - tomcat10
    - guacd